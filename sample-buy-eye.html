<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BUY 눈모양 샘플</title>
  <style>
    body{margin:0;background:#050505;color:#f5f5f5;font-family:Inter,system-ui,-apple-system,sans-serif;}
    .wrap{padding:16px;display:flex;flex-direction:column;gap:12px;}
    .btn{background:#101010;color:#f5f5f5;border:1px solid #232323;border-radius:10px;padding:12px 14px;font-weight:700;display:inline-flex;align-items:center;gap:8px}
    .buy-eye{display:inline-flex;align-items:center;gap:4px}
    .buy-eye span{width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(255,255,255,.5);position:relative;}
    .buy-eye span::after{content:"";position:absolute;inset:3px;border-radius:50%;background:#000;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="btn">BUY <span class="buy-eye"><span></span><span></span></span></div>
    <div class="btn">PASS</div>
    <div class="btn">THIS</div>
    <div class="btn">THAT</div>
  </div>
</body>
</html>
