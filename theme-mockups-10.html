<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>테마 목업 10종</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:#111;color:#fff;}
    .wrap{padding:16px;display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}
    .card{border-radius:14px;overflow:hidden;border:1px solid #222;}
    .top{padding:10px 12px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
    .content{padding:14px;display:flex;flex-direction:column;gap:10px;}
    .btn{padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;display:inline-block;}
    .badge{font-size:10px;padding:2px 6px;border-radius:999px;display:inline-block;}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 1 크림&브라운 클래식 -->
    <div class="card" style="background:#f7f1e6;color:#3d2c1a;">
      <div class="top" style="background:#efe3d1;">크림&브라운 클래식 <span class="badge" style="background:#3d2c1a;color:#fff;">01</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#3d2c1a;color:#fff;">BUY</div>
        <div class="btn" style="background:#c7a983;color:#3d2c1a;">PASS</div>
      </div>
    </div>

    <!-- 2 모노톤 잡지 편집 -->
    <div class="card" style="background:#fff;color:#111;">
      <div class="top" style="background:#f4f4f4;">모노톤 잡지 편집 <span class="badge" style="background:#111;color:#fff;">02</span></div>
      <div class="content">
        <div style="font-size:20px;font-weight:800;">Home</div>
        <div class="btn" style="border:1px solid #111;color:#111;">BUY</div>
        <div class="btn" style="background:#111;color:#fff;">PASS</div>
      </div>
    </div>

    <!-- 3 리사이클 매트 -->
    <div class="card" style="background:#f3f5ef;color:#2b3a2b;">
      <div class="top" style="background:#e2e6da;">리사이클 매트 <span class="badge" style="background:#2b3a2b;color:#fff;">03</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#2b3a2b;color:#fff;">BUY</div>
        <div class="btn" style="background:#8fb17a;color:#1b251b;">PASS</div>
      </div>
    </div>

    <!-- 4 실버 테크 -->
    <div class="card" style="background:#0e0f12;color:#e6e8ee;">
      <div class="top" style="background:#16181d;">실버 테크 <span class="badge" style="background:#c7cbd6;color:#111;">04</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#c7cbd6;color:#111;">BUY</div>
        <div class="btn" style="border:1px solid #c7cbd6;color:#c7cbd6;">PASS</div>
      </div>
    </div>

    <!-- 5 키치 팝 -->
    <div class="card" style="background:#fff0f6;color:#38132a;">
      <div class="top" style="background:#ffd6e7;">키치 팝 <span class="badge" style="background:#ff4da6;color:#fff;">05</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#ff4da6;color:#fff;">BUY</div>
        <div class="btn" style="background:#66ffd1;color:#134b3a;">PASS</div>
      </div>
    </div>

    <!-- 6 뮤지엄 라벨 -->
    <div class="card" style="background:#fbfaf7;color:#111;">
      <div class="top" style="background:#f1efe9;">뮤지엄 라벨 <span class="badge" style="background:#111;color:#fff;">06</span></div>
      <div class="content">
        <div style="font-size:20px;font-weight:900;">Home</div>
        <div class="btn" style="border:1px solid #111;color:#111;">BUY</div>
        <div class="btn" style="background:#111;color:#fff;">PASS</div>
      </div>
    </div>

    <!-- 7 브루탈 모노 -->
    <div class="card" style="background:#000;color:#fff;">
      <div class="top" style="background:#111;">브루탈 모노 <span class="badge" style="background:#fff;color:#000;">07</span></div>
      <div class="content">
        <div style="font-size:22px;font-weight:900;">HOME</div>
        <div class="btn" style="background:#fff;color:#000;">BUY</div>
        <div class="btn" style="border:2px solid #fff;color:#fff;">PASS</div>
      </div>
    </div>

    <!-- 8 코랄 선셋 -->
    <div class="card" style="background:#fff4f1;color:#4a1b14;">
      <div class="top" style="background:#ffd6c8;">코랄 선셋 <span class="badge" style="background:#ff6b57;color:#fff;">08</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#ff6b57;color:#fff;">BUY</div>
        <div class="btn" style="background:#ffe2d9;color:#4a1b14;">PASS</div>
      </div>
    </div>

    <!-- 9 잉크 블루 -->
    <div class="card" style="background:#0b1230;color:#e9ecff;">
      <div class="top" style="background:#111a40;">잉크 블루 <span class="badge" style="background:#6aa3ff;color:#0b1230;">09</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#6aa3ff;color:#0b1230;">BUY</div>
        <div class="btn" style="border:1px solid #6aa3ff;color:#6aa3ff;">PASS</div>
      </div>
    </div>

    <!-- 10 우든 스튜디오 -->
    <div class="card" style="background:#f4efe6;color:#3b2a20;">
      <div class="top" style="background:#e6d8c4;">우든 스튜디오 <span class="badge" style="background:#3b2a20;color:#fff;">10</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#3b2a20;color:#fff;">BUY</div>
        <div class="btn" style="background:#c9b08a;color:#3b2a20;">PASS</div>
      </div>
    </div>
  </div>
</body>
</html>
