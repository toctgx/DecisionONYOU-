<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DecisionONYOU</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@600;700;800&display=swap');
  :root{
    --desktop:#0b0b0b;
    --win-gray:#0f0f10;
    --win-light:#141414;
    --win-dark:#2a2a2a;
    --win-black:#e6e6e6;
    --title:#e6e6e6;
    --white:#ffffff;
    --text:#f2f2f2;
    --danger:#ff3b30;
    --ok:#8e8e93;
    --accent:#bfbfbf;
    --accent2:#8e8e93;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Inter","Noto Sans KR", Helvetica, Arial, sans-serif;
    background:var(--desktop);
    color:var(--text);
    min-height:100vh;
    overflow:auto;
  }

  .desktop{
    width:100%;
    min-height:100vh;
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .window{
    width:100%;
    max-width:460px;
    background:var(--win-gray);
    border:1px solid #2a2a2a;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
    transform:translate3d(0,0,0);
    display:flex;
    flex-direction:column;
  }

  :root{--nav-h:72px;}
  .content{padding:2px 4px calc(var(--nav-h) + 40px); max-height:calc(100vh - 100px); overflow:auto; display:flex; flex-direction:column;}
  #screen-home{display:flex; flex-direction:column; gap:6px; flex:1;}
  #homeFeedArea{flex:1; display:flex; flex-direction:column; padding-bottom:12px;}
  .vote-bar{position:sticky; bottom:0; background:var(--win-gray); padding:6px; border-top:1px solid var(--win-dark); display:flex; gap:8px;}
  .result-toggle{margin-left:auto; font-size:12px; cursor:pointer; color:#bfbfbf;}
  .thumb-grid{display:grid; grid-template-columns:1fr auto 1fr; gap:2px; align-items:center;}
  .thumb-grid .vs{font-weight:700; padding:0 6px; color:#bfbfbf;}
  .countdot{display:inline-flex; gap:4px; align-items:center;}
  .countdot span{width:6px; height:6px; border-radius:50%; background:#bbb; display:inline-block;}
  .countdot span.on{background:#222;}
  .comment-toggle{
    display:block; width:100%;
    font-size:12px; cursor:pointer; color:#f2f2f2;
    margin:8px 0; padding:8px 10px;
    border:none; border-radius:8px; background:transparent;
  }
  #commentArea{margin-top:10px; padding-bottom:8px; margin-bottom:calc(var(--nav-h) + 4px);} 
  #commentList{max-height:120px; overflow:auto;}

  .window.hidden{display:none}

  .titlebar{
    background:#0b0b0b;
    color:#e6e6e6;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 14px;
    font-size:13px;
    font-weight:700;
    letter-spacing:.6px;
    user-select:none;
    border-bottom:1px solid #2a2a2a;
  }
  #splashWindow .titlebar{display:none;}
  @keyframes bauhausPulse{0%{letter-spacing:1px; transform:translateY(0);}50%{letter-spacing:2px; transform:translateY(-2px);}100%{letter-spacing:1px; transform:translateY(0);}}
  .splash-logo{font-family:'Noto Sans KR', Arial, sans-serif; font-weight:900; text-align:center; line-height:1.1;}
  .splash-logo .on{color:#e53935;}
  .splash-logo .you{color:#2b6cb0;}

  .splash-artboard-wrap{display:flex; justify-content:center; align-items:center; width:100%; height:100%;}
  .splash-artboard{
    position:relative; width:1200px; height:800px; background:#f5f3ef; overflow:visible;
    transform-origin:center;
    transform:scale(min(calc(100vw / 1200), calc(100vh / 800)));
  }

  .splash-text{position:absolute; left:300px; top:210px; z-index:5; line-height:0.9;}
  .splash-line1,.splash-line2{display:flex; align-items:center; gap:24px; font-weight:900; letter-spacing:-6px; text-transform:uppercase; font-family:"Arial Black", Arial, Helvetica, sans-serif;}
  .splash-line1{font-size:150px; color:#262626;}
  .splash-line2{margin-top:10px; font-size:185px; color:#f04a2a; letter-spacing:-10px;}
  .shape{position:absolute;}
  .yellow{background:#f3c23a;} .red{background:#f04a2a;} .blue{background:#3f84c5;} .black{background:#2e2e2e;} .line{background:#444;}
  .circle{border-radius:50%;} .square{width:64px; height:64px;} .rounded-bar{border-radius:999px;}
  .c1{width:170px;height:170px;left:190px;top:110px;} .sq1{width:18px;height:18px;left:495px;top:140px;} .c2{width:30px;height:30px;left:695px;top:205px;} .sq2{width:74px;height:74px;left:910px;top:155px;} .sq3{width:26px;height:26px;left:1005px;top:255px;}
  .bar1{width:75px;height:12px;left:190px;top:385px;} .c3{width:42px;height:42px;left:1040px;top:445px;} .sq4{width:60px;height:60px;left:230px;top:590px;} .sq5{width:70px;height:70px;left:300px;top:540px;} .c4{width:28px;height:28px;left:555px;top:615px;} .c5{width:170px;height:170px;left:960px;top:525px;}
  .l1{width:390px;height:2px;left:290px;top:205px;} .l2{width:2px;height:140px;left:290px;top:205px;} .l3{width:2px;height:85px;left:480px;top:120px;} .l4{width:220px;height:2px;left:660px;top:600px;} .l5{width:2px;height:150px;left:1000px;top:480px;} .l6{width:145px;height:2px;left:855px;top:630px;} .l7{width:230px;height:2px;left:300px;top:620px;}
  .parallel,.parallel2,.parallel3{position:absolute; display:flex; flex-direction:column; gap:10px;}
  .parallel span,.parallel2 span,.parallel3 span{display:block; height:2px; background:#444;}
  .parallel{left:1000px;top:315px;} .parallel span{width:72px;}
  .parallel2{left:238px;top:485px;} .parallel2 span{width:65px;}
  .parallel3{left:825px;top:623px;flex-direction:row;gap:10px;} .parallel3 span{width:2px;height:72px;background:#e2b32b;}
  .tiny-yellow{position:absolute;width:46px;height:3px;background:#f3c23a;left:265px;top:470px;}
  .tiny-yellow-2{position:absolute;width:36px;height:3px;background:#f3c23a;left:855px;top:212px;}
  .tiny-mark{position:absolute;width:18px;height:3px;background:#f3c23a;left:866px;top:218px;transform:rotate(25deg);transform-origin:left center;}

  .menubar{display:none;}
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding:10px 16px 12px; background:#0b0b0b;
    border-top:none; height:var(--nav-h); box-sizing:border-box;
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
  }
  .bottom-nav::before{
    content:""; position:absolute; left:0; right:0; top:4px; height:1px; background:#2a2a2a;
  }
  .bottom-nav .nav-link{
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:8px 0; cursor:pointer;
    background:transparent; border:none; color:#f2f2f2;
  }
  .bottom-nav .nav-link svg{width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2;}
  .bottom-nav .nav-link.active{color:#ffffff;}
  .nav-center{
    width:54px; height:54px; border-radius:50%;
    background:#0b0b0b; border:2px solid #2a2a2a;
    display:flex; align-items:center; justify-content:center;
    transform:translateY(-12px);
    overflow:hidden;
  }
  .nav-center span{
    font-size:20px; font-weight:900; letter-spacing:.3px; color:#f2f2f2; line-height:1;
    font-family:"Apple SD Gothic Neo","Inter","Noto Sans KR",sans-serif;
  }

  .content{
    padding:2px 4px;
    max-height:calc(100vh - 100px);
    overflow:hidden;
  }

  .statusbar{
    display:flex;
    justify-content:space-between;
    gap:8px;
    padding:6px 8px;
    border-top:1px solid var(--win-dark);
    font-size:12px;
    background:var(--win-gray);
  }

  .panel{
    background:#141414;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #2a2a2a;
    border-radius:8px;
  }

  .card{
    background:#141414;
    padding:8px;
    margin-bottom:10px;
    border:1px solid #2a2a2a;
    border-radius:8px;
  }
  .question-card .card{padding:0; margin-bottom:12px;}

  .q-title{
    font-size:17px;
    font-weight:700;
    line-height:1.35;
    margin:6px 0 6px;
    word-break:keep-all;
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  }
  .new-badge{
    font-size:11px; font-weight:700; color:#fff; background:#ff3b30;
    padding:2px 6px; border-radius:10px;
  }
  .icon-btn{
    background:transparent; border:none;
    padding:4px 6px; width:32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; line-height:1; color:#e6e6e6;
  }
  .icon-btn svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2;}
  .icon-btn.active{opacity:.85;}

  .muted{color:#e0e0e0; font-size:12px;}

  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .row-between{display:flex; justify-content:space-between; gap:8px; align-items:center;}

  .tabs{display:flex; gap:6px; margin:6px 0 8px; flex-wrap:wrap;}
  .type-toggle{display:flex; flex-direction:column; gap:8px;}
  .type-btn{width:100%;}
  .type-btn.active{outline:1px solid #8e8e93;}
  .ask-countdown{
    margin-top:10px; padding-bottom:24px;
    font-size:32px; font-weight:900; text-align:center; color:#f2f2f2; letter-spacing:1px;
  }

  .btn{
    appearance:none;
    background:#1a1a1a;
    color:#f2f2f2;
    padding:11px 12px;
    font-size:14px;
    min-height:38px;
    border:1px solid #2a2a2a;
    border-radius:8px;
    cursor:pointer;
    font-family:inherit;
    font-weight:700;
  }
  .tabs .btn{min-height:40px; font-size:14px;}
  .tabs .btn:nth-child(1){background:#1a1a1a;}
  .tabs .btn:nth-child(2){background:#1a1a1a;}
  .tabs .btn.active{outline:1px solid #8e8e93;}
  #voteArea .btn:nth-child(1){background:#1a1a1a;}
  #voteArea .btn:nth-child(2){background:#1a1a1a;}

  .btn:active,
  .btn.active{
    background:var(--accent);
  }

  .btn:disabled{color:#666; cursor:not-allowed;}
  .btn-primary{font-weight:bold;}
  .btn-danger{color:var(--danger); font-weight:bold;}
  .btn-wide{width:100%; text-align:left; display:block;}

  .poll-wrap{display:flex; align-items:center; gap:8px; font-size:12px; color:#e0e0e0;}
  .poll-bar{flex:1; height:16px; background:#fff; border-top:2px solid var(--win-dark); border-left:2px solid var(--win-dark); border-right:2px solid var(--white); border-bottom:2px solid var(--white); padding:2px;}
  .poll-fill{height:100%; background:#2e8b57; width:0%; min-width:2px; transition:width .2s linear;}
  .poll-label{font-weight:700; min-width:30px;}

  .input,.textarea{
    width:100%;
    background:#141414;
    color:#f2f2f2;
    border:1px solid #2a2a2a;
    padding:10px;
    font-family:inherit;
    font-size:14px;
    outline:none;
    border-radius:8px;
  }
  .input::placeholder,.textarea::placeholder{color:#8e8e93;}

  .textarea{resize:none; min-height:92px;}
  .label{display:block; margin:10px 0 6px; font-size:13px; font-weight:bold;}
  .small{font-size:12px; color:#e0e0e0;}

  .error{color:var(--danger); font-size:12px; margin-top:6px; white-space:pre-line;}
  .ok{color:var(--ok); font-size:12px; margin-top:6px; white-space:pre-line;}

  .hr{border-top:1px solid var(--win-dark); margin:10px 0;}

  .option-btn{flex:1; margin:0; text-align:center;}
  #voteArea{display:flex; gap:8px; margin:6px 0;}

  .progress-shell{
    width:100%;
    height:22px;
    background:transparent;
    border:none;
    margin:6px 0;
    display:flex;
    gap:4px;
    padding:0;
  }
  .progress-seg{flex:1; background:#fff; border:1px solid #222;}
  .progress-seg.on{background:#222;}

  .result-line{margin:10px 0 12px;}

  .result-bar-shell{
    width:100%;
    height:22px;
    background:#fff;
    border-top:2px solid var(--win-dark);
    border-left:2px solid var(--win-dark);
    border-right:2px solid var(--white);
    border-bottom:2px solid var(--white);
    overflow:hidden;
    margin-top:4px;
  }

  .result-bar{height:100%; background:#000080;}

  .badge{
    display:inline-block;
    padding:4px 8px;
    background:#141414;
    border:1px solid #2a2a2a;
    color:#f2f2f2;
    font-size:12px;
    margin-right:6px;
    margin-bottom:6px;
    border-radius:8px;
  }
  .badge-btn{cursor:pointer;}

  .hidden{display:none !important;}
  .center{text-align:center;}

  .welcome-note{line-height:1.5; font-size:13px;}
  .home-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}

  .comment-input{
    display:flex; align-items:center; gap:8px;
    background:#141414; border:1px solid #2a2a2a; border-radius:14px;
    padding:8px 12px; margin-bottom:12px;
    box-shadow:0 0 0 1px #2a2a2a inset;
  }
  .comment-input input{
    flex:1; border:none; outline:none; font-size:13px; background:transparent; color:#f2f2f2;
  }
  .comment-input input::placeholder{color:#8e8e93;}
  .comment-send{
    min-width:56px; height:34px; border-radius:10px; border:none; background:#3b6bff; color:#fff;
    font-size:13px; font-weight:700; cursor:pointer; padding:0 10px;
  }
  .comment-send:disabled{background:#8aa3ff;}
  .splash-img{width:100%; display:block; border-top:2px solid var(--win-dark); border-left:2px solid var(--win-dark); border-right:2px solid var(--white); border-bottom:2px solid var(--white);}
  .consent{display:flex; gap:6px; align-items:flex-start; font-size:12px; margin-top:6px;}

  .question-shell{position:relative; min-height:auto; overflow:hidden;}
  .question-card img{aspect-ratio:1/1; object-fit:cover; width:100%; max-height:60vh; border-radius:8px;}
  @media (max-height:760px){
    .question-card img{max-height:36vh;}
    .q-title{font-size:15px; margin:4px 0;}
    .btn{min-height:30px; font-size:12px;}
    .statusbar{display:none;}
    .panel{padding:8px; margin-bottom:6px;}
  }
  @media (max-height:680px){
    .question-card img{max-height:32vh;}
    .q-title{font-size:14px;}
    .tabs{margin-bottom:4px;}
  }

  .question-card{transition:transform .28s ease, opacity .28s ease;}
  .question-card.swipe-out{transform:translateX(110%); opacity:0;}

  .empty-box{
    background:#fff;
    padding:22px 14px;
    text-align:center;
    border-top:2px solid var(--win-dark);
    border-left:2px solid var(--win-dark);
    border-right:2px solid var(--white);
    border-bottom:2px solid var(--white);
    line-height:1.5;
  }

  .footer-note{margin-top:8px; font-size:12px; color:#222;}

  @media (max-width:600px){
    .desktop{padding:0;}
    .window{max-width:100%; min-height:100vh;}
    .content{max-height:none;}
    .q-title{font-size:16px;}
    .btn{min-height:30px; font-size:12px;}
  }

  @media (min-width:601px) and (max-width:1024px){
    .window{max-width:820px;}
    .q-title{font-size:17px;}
    .btn{min-height:32px; font-size:13px;}
  }

  @media (min-width:1025px){
    .window{max-width:980px;}
  }
  </style>
</head>
<body>
<div class="desktop">

  <!-- EXIT -->
  <section class="window hidden" id="exitWindow">
    <div class="titlebar">
      <span>Exit</span>
    </div>
    <div class="content">
      <div class="panel center">앱이 종료되었습니다.</div>
    </div>
    <div class="statusbar"><span>Closed</span><span>Bye</span></div>
  </section>

  <!-- WELCOME / PROFILE -->
  <section class="window hidden" id="welcomeWindow">
    <div class="titlebar">
      <span>결정장애ON YOU</span>
    </div>

    <div class="content">
      <div class="panel">
        <div class="welcome-note" style="border:2px dashed #6a6a6a; padding:10px; background:#f7f7f7;">
          <div style="font-weight:700; margin-bottom:6px;">WELCOME</div>
          회원가입 없이 사용할 수 있습니다.<br>
          기본 테스트 계정이 자동 입력되어 있습니다.<br><br>
          <strong>테스트 닉네임: 1234</strong><br><strong>테스트 비밀번호: 1234</strong>
        </div>

        <label class="label" for="nicknameInput">닉네임</label>
        <input id="nicknameInput" class="input" maxlength="12" value="1234" placeholder="2~12자">

        <label class="label" for="genderSelect">성별</label>
        <select id="genderSelect" class="input">
          <option value="male">남</option>
          <option value="female">여</option>
        </select>

        <label class="label" for="ageInput">나이</label>
        <input id="ageInput" class="input" type="number" min="18" max="99" placeholder="나이 입력">


        <label class="label" for="passwordInput">비밀번호</label>
        <input id="passwordInput" class="input" type="password" maxlength="20" value="1234" placeholder="4자 이상">

        <div id="profileMessage" class="error"></div>

        <div class="home-actions">
          <button class="btn btn-primary" id="saveProfileBtn">확인</button>
          <button class="btn" id="enterTestBtn">테스트 계정으로 시작</button>
        </div>
      </div>
    </div>

    <div class="statusbar">
      <span>Ready</span>
      <span>AnswerMe v0.1</span>
    </div>
  </section>

  <!-- APP -->
  <section class="window hidden" id="appWindow">
    <div class="titlebar">
      <span id="appTitle">결정장애ON YOU</span>
    </div>

    <div class="menubar"></div>

    <div class="content">
      <!-- HOME -->
      <div id="screen-home">
        <div class="tabs">
          <button class="btn active" id="sortLatestBtn">BUY / PASS</button>
          <button class="btn" id="sortPopularBtn">THIS / THAT</button>
        </div>


        <div id="homeFeedArea"></div>
      </div>

      <!-- ASK -->
      <div id="screen-ask" class="hidden">
        <div class="panel">
          <div class="small">질문 타입을 선택하고 이미지를 올리세요.</div>
          <div class="small">(얼굴/닉네임 등은 노출하지 마세요)</div>

          <label class="label" for="questionType">질문 타입</label>
          <div class="type-toggle">
            <button class="btn type-btn active" data-type="single">BUY vs PASS</button>
            <button class="btn type-btn" data-type="compare">THIS vs THAT</button>
          </div>
          <select id="questionType" class="input" style="display:none;">
            <option value="single">BUY vs PASS</option>
            <option value="compare">THIS vs THAT</option>
          </select>

          <label class="label" for="imageInput">이미지 업로드 (THIS)</label>
          <input id="imageInput" class="input" type="file" accept="image/*">

          <div id="compareBlock" style="display:none;">
            <label class="label" for="imageInput2">이미지 업로드 (THAT)</label>
            <input id="imageInput2" class="input" type="file" accept="image/*">
          </div>

          <label class="label" for="questionInput">설명 (최대 60자)</label>
          <textarea id="questionInput" class="textarea" maxlength="60" placeholder="예: 지금 안사면 후회할까?"></textarea>
          <div class="small"><span id="questionCount">0</span> / 60</div>

          <div id="askMessage" class="error"></div>

          <div class="home-actions">
            <button class="btn btn-primary" id="submitQuestionBtn">등록</button>
            <button class="btn" id="resetAskBtn">내용삭제</button>
            <button class="btn" id="backHomeFromAskBtn">피드로</button>
          </div>
          <div id="askCountdown" class="ask-countdown" aria-live="polite" style="display:none;"></div>
        </div>
      </div>

      <!-- MY -->
      <div id="screen-my" class="hidden">
        <div class="panel">
          <div><strong id="myNickLabel">1234</strong></div>
          <div class="small">회원가입 없는 로컬 테스트 버전</div>
          <div class="hr"></div>

          <div class="row">
            <span class="badge badge-btn" id="btnMyQuestions">내 질문 <span id="myQuestionCount">0</span></span>
            <span class="badge badge-btn" id="btnMyVotes">내 투표현황 <span id="myVoteCount">0</span></span>
            <span class="badge badge-btn" id="btnMyFavs">즐겨찾기 <span id="myFavCount">0</span></span>
          </div>

          <div class="hr"></div>

          <label class="label" for="nicknameEdit">닉네임 변경</label>
          <input id="nicknameEdit" class="input" maxlength="12" placeholder="새 닉네임 (2~12자)">

          <div id="myMessage" class="error"></div>

          <div class="home-actions">
            <button class="btn" id="saveProfileEditBtn">프로필 저장</button>
          </div>
        </div>

function loadLocal(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}

function saveLocal(key, value){
  localStorage.setItem(key, JSON.stringify(value));
}

function shuffleArray(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeDraggable(win){
  const bar = win.querySelector('.titlebar');
  if(!bar) return;
  let startX=0, startY=0, lastX=0, lastY=0, dragging=false;
  const onStart = (e) => {
    dragging = true;
    const p = e.touches ? e.touches[0] : e;
    startX = p.clientX; startY = p.clientY;
    const t = win.dataset.translate ? win.dataset.translate.split(',').map(Number) : [0,0];
    lastX = t[0]; lastY = t[1];
  };
  const onMove = (e) => {
    if(!dragging) return;
    const p = e.touches ? e.touches[0] : e;
    const dx = p.clientX - startX;
    const dy = p.clientY - startY;
    const nx = lastX + dx;
    const ny = lastY + dy;
    win.dataset.translate = `${nx},${ny}`;
    win.style.transform = `translate(${nx}px, ${ny}px)`;
  };
  const onEnd = () => { dragging = false; };
  bar.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
  bar.addEventListener('touchstart', onStart, {passive:true});
  window.addEventListener('touchmove', onMove, {passive:true});
  window.addEventListener('touchend', onEnd);
}

function sanitize(text){
  return text.replace(/\s+/g, " ").trim();
}

function normalizeText(text){
  return text.toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[0@]/g, "o")
    .replace(/[1!|]/g, "i")
    .replace(/[3]/g, "e")
    .replace(/[5\$]/g, "s")
    .replace(/[7]/g, "t")
    .replace(/[\._\-]/g, "");
}

function containsBannedWord(text){
  const normalized = normalizeText(text);
  return bannedWords.some(word => normalized.includes(word));
}

function maskText(text){
  if(!text) return "";
  let out = text;
  maskWords.forEach(w => {
    const re = new RegExp(w, "gi");
    out = out.replace(re, "*".repeat(w.length));
  });
  return out;
}

function validateProfile(nick, pw, age, region){
  if(!nick || nick.length < 2 || nick.length > 12){
    return "닉네임은 2~12자여야 합니다.";
  }
  if(!pw || pw.length < 4){
    return "비밀번호는 4자 이상이어야 합니다.";
  }
  if(!age || age < 18){
    return "나이는 18세 이상이어야 합니다.";
  }
  if(containsBannedWord(nick)){
    return "닉네임에 부적절한 표현이 포함되어 있습니다.";
  }
  return "";
}

function validateQuestion(q){
  if(q && q.length > 60) return "캡션은 60자 이하만 가능합니다.";
  if(q && containsBannedWord(q)){
    return "캡션에 부적절한 표현이 포함되어 있습니다.";
  }
  return "";
}

function getSortedQuestions(){
  let arr = [...questions].filter(q => !reports[q.id]);

  // 최신: 사라/마라, 인기: 이거/저거
  if(session.sort === "latest"){
    arr = arr.filter(q => q.type !== "compare");
  }else if(session.sort === "popular"){
    arr = arr.filter(q => q.type === "compare");
  }

  if(session.sort === "popular"){
    arr.sort((a,b) => (b.v1 + b.v2) - (a.v1 + a.v2));
  }else{
    arr.sort((a,b) => b.createdAt - a.createdAt);
  }
  return arr;
}

function buildQueueIfNeeded(forceReset=false){
  const sortedIds = getSortedQuestions().map(q => q.id);

  if(forceReset || session.currentQueue.length === 0){
    session.currentQueue = sortedIds;
    session.currentIndex = 0;
    saveSession();
    return;
  }

  const existingSet = new Set(session.currentQueue);
  sortedIds.forEach(id => {
    if(!existingSet.has(id)) session.currentQueue.push(id);
  });

  session.currentQueue = session.currentQueue.filter(id => sortedIds.includes(id));

  if(session.currentIndex >= session.currentQueue.length){
    session.currentIndex = session.currentQueue.length;
  }

  saveSession();
}

function saveSession(){
  saveLocal(STORAGE_KEYS.session, session);
}

function isNewQuestion(q){
  if(!q || !q.createdAt) return false;
  return (Date.now() - q.createdAt) < 24 * 60 * 60 * 1000;
}

function getCurrentQuestion(){
  while(session.currentIndex < session.currentQueue.length){
    const id = session.currentQueue[session.currentIndex];
    const q = questions.find(q => q.id === id) || null;
    if(q && !votes[id]) return q;
    session.currentIndex += 1;
  }
  return null;
}

function startCountdown(onDone){
  clearCountdown();
  countdownValue = 5;
  const countdownBar = document.getElementById("countdownBar");
  const segs = countdownBar ? countdownBar.querySelectorAll('.progress-seg') : [];
  let ticks = 0;

  segs.forEach(s => s.classList.remove('on'));

  countdownTimer = setInterval(() => {
    ticks += 1;
    const percent = Math.min((ticks / 5), 1);
    const fillCount = Math.round(segs.length * percent);
    segs.forEach((s, i) => s.classList.toggle('on', i < fillCount));

    if(ticks >= 5){
      clearCountdown();
      onDone();
    }
  }, 1000);
}

function clearCountdown(){
  if(countdownTimer){
    clearInterval(countdownTimer);
    countdownTimer = null;
  }
}

function startAskCountdown(){
  stopAskCountdown();



  askCountdownValue = 60;
  const el = document.getElementById("centerCycle");
  if(el){
    el.style.color = "#f2f2f2";
    el.textContent = askCountdownValue;
  }
  stopCenterCycle();
  askCountdownTimer = setInterval(() => {
    askCountdownValue -= 1;
    if(el) el.textContent = askCountdownValue;
    if(askCountdownValue <= 0){
      stopAskCountdown();
    }
  }, 1000);
}

function stopAskCountdown(){
  if(askCountdownTimer){
    clearInterval(askCountdownTimer);
    askCountdownTimer = null;
  }
  const el = document.getElementById("centerCycle");
  if(el){
    el.style.color = "#f2f2f2";
    el.textContent = cycleWords[cycleIndex];
  }
  startCenterCycle();
}

function handleVote(questionId, pick, resultMini, vote1Btn, vote2Btn, nextBtn, commentList){
  if(!canVote) return;
  const q = questions.find(item => item.id === questionId);
  if(!q) return;
  if(votes[questionId]) return;

  if(pick === 1) q.v1 += 1;
  else q.v2 += 1;

  votes[questionId] = {
    pick,
    nickname: currentProfile.nickname,
    votedAt: Date.now()
  };

  saveLocal(STORAGE_KEYS.questions, questions);
  saveLocal(STORAGE_KEYS.votes, votes);

  canVote = false;
  vote1Btn.disabled = true;
  vote2Btn.disabled = true;

  renderComments(q.id, commentList);

  updateCounts();
  clearCountdown();

  const questionCard = document.getElementById("questionCard");
  if(nextBtn) nextBtn.onclick = () => moveNextWithSwipe(questionCard);
  moveNextImmediate();
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function renderComments(qid, container){
  const list = comments[qid] || [];
  container.innerHTML = list.map(c => {

    return `<div class="muted"><strong>${escapeHtml(c.author)}</strong> ${text}</div>`;
  }).join("") || "<div class=\"muted\">아직 댓글이 없습니다.</div>";
}

function enableSwipe(cardEl, onSwipe){
  if(!cardEl) return;
  let startX = 0;
  let currentX = 0;
  let dragging = false;

  const start = (e) => {
    dragging = true;
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    cardEl.style.transition = "none";
  };

  const move = (e) => {
    if(!dragging) return;
    currentX = (e.touches ? e.touches[0].clientX : e.clientX);
    const dx = Math.max(0, currentX - startX);
    cardEl.style.transform = `translateX(${dx}px)`;
  };

  const end = () => {
    if(!dragging) return;
    dragging = false;
    const dx = Math.max(0, currentX - startX);
    cardEl.style.transition = "transform .2s ease";
    if(dx > 80){
      onSwipe();
    }
    cardEl.style.transform = "translateX(0)";
  };

  cardEl.addEventListener("mousedown", start);
  cardEl.addEventListener("mousemove", move);
  cardEl.addEventListener("mouseup", end);
  cardEl.addEventListener("mouseleave", end);
  cardEl.addEventListener("touchstart", start, {passive:true});

}

submitQuestionBtn.addEventListener("click", () => {
  const q = sanitize(questionInput.value);
  if(bannedUsers[currentProfile.nickname]){
    askMessage.className = "error";
    askMessage.textContent = "이용이 제한된 계정입니다.";
    return;
  }

  const isCompare = questionType.value === "compare";
  if(!imageInput.files || imageInput.files.length === 0){
    askMessage.className = "error";
    askMessage.textContent = "1번 이미지를 업로드해주세요.";
    return;
  }
  if(isCompare){
    if(!imageInput2.files || imageInput2.files.length === 0){
      askMessage.className = "error";
      askMessage.textContent = "저것 이미지를 업로드해주세요.";
      return;
    }
  }

  const err = validateQuestion(q);
  askMessage.className = err ? "error" : "ok";
  askMessage.textContent = err || "등록되었습니다.";
  if(err) return;

  const file1 = imageInput.files[0];
  const reader1 = new FileReader();
  reader1.onload = () => {
    if(!isCompare){
      const newQuestion = {
        id: makeId(),
        q,
        type: "single",
        image: reader1.result,
        a1: "사라",
        a2: "마라",
        v1: 0,
        v2: 0,
        author: currentProfile.nickname,
        createdAt: Date.now()
      };
      questions.push(newQuestion);
      saveLocal(STORAGE_KEYS.questions, questions);
      buildQueueIfNeeded(false);
      updateCounts();
      renderMyPage();

      questionInput.value = "";
      questionCount.textContent = "0";
      imageInput.value = "";
      const ok = confirm("등록 완료");
      if(ok){
        session.sort = "latest";
        buildQueueIfNeeded(true);
        showScreen("home");
        renderFeed();
      }
      return;
    }

    const file2 = imageInput2.files[0];
    const reader2 = new FileReader();
    reader2.onload = () => {
      const newQuestion = {
        id: makeId(),
        q,
        type: "compare",
        image: reader1.result,
        image2: reader2.result,
        label1: "이것",
        label2: "저것",
        a1: "이것",
        a2: "저것",
        v1: 0,
        v2: 0,
        author: currentProfile.nickname,
        createdAt: Date.now()
      };

      questions.push(newQuestion);
      saveLocal(STORAGE_KEYS.questions, questions);
      buildQueueIfNeeded(false);
      updateCounts();
      renderMyPage();

      questionInput.value = "";
      questionCount.textContent = "0";
      imageInput.value = "";
      imageInput2.value = "";

      const ok = confirm("등록 완료");
      if(ok){
        session.sort = "popular";
        buildQueueIfNeeded(true);
        showScreen("home");
        renderFeed();
      }
    };
    reader2.readAsDataURL(file2);
  };
  reader1.readAsDataURL(file1);
});


saveProfileEditBtn.addEventListener("click", () => {
  const nextNick = nicknameEdit.value.trim();
  const now = Date.now();
  const monthMs = 30 * 24 * 60 * 60 * 1000;

  if(!nextNick || nextNick.length < 2 || nextNick.length > 12){

    currentProfile.nickname = nextNick;
    currentProfile.lastNickChangeAt = now;
  }
  saveLocal(STORAGE_KEYS.profile, currentProfile);
  updateCounts();
  myMessage.className = "ok";
  myMessage.textContent = "프로필이 저장되었습니다.";
});

const cycleWords = ["BUY","PASS","THIS","THAT"];
let cycleIndex = 0;
let centerCycleTimer = null;
function startCenterCycle(){
  const el = document.getElementById("centerCycle");
  if(!el) return;
  el.style.color = "#f2f2f2";
  if(centerCycleTimer) return;
  centerCycleTimer = setInterval(() => {
    cycleIndex = (cycleIndex + 1) % cycleWords.length;
    el.textContent = cycleWords[cycleIndex];
  }, 1000);
}
function stopCenterCycle(){
  if(centerCycleTimer){
    clearInterval(centerCycleTimer);
    centerCycleTimer = null;
  }
}

startCenterCycle();
boot();
