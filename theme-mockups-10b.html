<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>테마 목업 10종 (11~20)</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:#111;color:#fff;}
    .wrap{padding:16px;display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}
    .card{border-radius:14px;overflow:hidden;border:1px solid #222;}
    .top{padding:10px 12px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
    .content{padding:14px;display:flex;flex-direction:column;gap:10px;}
    .btn{padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;display:inline-block;}
    .badge{font-size:10px;padding:2px 6px;border-radius:999px;display:inline-block;}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 11 Neo Tokyo -->
    <div class="card" style="background:#07090d;color:#d8f3ff;">
      <div class="top" style="background:#0e1219;">Neo Tokyo <span class="badge" style="background:#00eaff;color:#071018;">11</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#00eaff;color:#071018;">BUY</div>
        <div class="btn" style="border:1px solid #00eaff;color:#00eaff;">PASS</div>
      </div>
    </div>

    <!-- 12 Paper Cutout -->
    <div class="card" style="background:#fdfaf3;color:#222;">
      <div class="top" style="background:#f3ead7;">Paper Cutout <span class="badge" style="background:#ff3b3b;color:#fff;">12</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#ff3b3b;color:#fff;">BUY</div>
        <div class="btn" style="background:#2f7bff;color:#fff;">PASS</div>
      </div>
    </div>

    <!-- 13 Noir Cinema -->
    <div class="card" style="background:#0b0b0b;color:#f5f5f5;">
      <div class="top" style="background:#111;">Noir Cinema <span class="badge" style="background:#ff2d2d;color:#fff;">13</span></div>
      <div class="content">
        <div style="font-size:20px;font-weight:900;">HOME</div>
        <div class="btn" style="background:#ff2d2d;color:#fff;">BUY</div>
        <div class="btn" style="border:1px solid #fff;color:#fff;">PASS</div>
      </div>
    </div>

    <!-- 14 Vapor Mist -->
    <div class="card" style="background:#f2eaff;color:#351d63;">
      <div class="top" style="background:#e2d6ff;">Vapor Mist <span class="badge" style="background:#5ef2d0;color:#1b2b2a;">14</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#7b5bff;color:#fff;">BUY</div>
        <div class="btn" style="background:#5ef2d0;color:#1b2b2a;">PASS</div>
      </div>
    </div>

    <!-- 15 Tech Blueprint -->
    <div class="card" style="background:#0b1d2f;color:#d7e9ff;">
      <div class="top" style="background:#11283f;">Tech Blueprint <span class="badge" style="background:#7acbff;color:#0b1d2f;">15</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#7acbff;color:#0b1d2f;">BUY</div>
        <div class="btn" style="border:1px solid #7acbff;color:#7acbff;">PASS</div>
      </div>
    </div>

    <!-- 16 Desert Sand -->
    <div class="card" style="background:#f3e7d7;color:#4b3323;">
      <div class="top" style="background:#e8d5bf;">Desert Sand <span class="badge" style="background:#c46b3b;color:#fff;">16</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#c46b3b;color:#fff;">BUY</div>
        <div class="btn" style="background:#f1c9a3;color:#4b3323;">PASS</div>
      </div>
    </div>

    <!-- 17 Monochrome Glass -->
    <div class="card" style="background:#1a1a1a;color:#f2f2f2;">
      <div class="top" style="background:rgba(255,255,255,.05);backdrop-filter:blur(6px);">Monochrome Glass <span class="badge" style="background:#cfd3d9;color:#111;">17</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#cfd3d9;color:#111;">BUY</div>
        <div class="btn" style="border:1px solid #cfd3d9;color:#cfd3d9;">PASS</div>
      </div>
    </div>

    <!-- 18 Sakura Night -->
    <div class="card" style="background:#0c0f24;color:#f7e6f2;">
      <div class="top" style="background:#14183a;">Sakura Night <span class="badge" style="background:#ff8bd6;color:#0c0f24;">18</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#ff8bd6;color:#0c0f24;">BUY</div>
        <div class="btn" style="border:1px solid #ff8bd6;color:#ff8bd6;">PASS</div>
      </div>
    </div>

    <!-- 19 Lime Lab -->
    <div class="card" style="background:#f8fff0;color:#1f2b17;">
      <div class="top" style="background:#e9ffcc;">Lime Lab <span class="badge" style="background:#9cff00;color:#1f2b17;">19</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">Home</div>
        <div class="btn" style="background:#9cff00;color:#1f2b17;">BUY</div>
        <div class="btn" style="background:#d9ff8a;color:#1f2b17;">PASS</div>
      </div>
    </div>

    <!-- 20 Retro Terminal -->
    <div class="card" style="background:#031d0f;color:#8bff6a;">
      <div class="top" style="background:#072a17;">Retro Terminal <span class="badge" style="background:#8bff6a;color:#031d0f;">20</span></div>
      <div class="content">
        <div style="font-size:18px;font-weight:800;">HOME</div>
        <div class="btn" style="background:#8bff6a;color:#031d0f;">BUY</div>
        <div class="btn" style="border:1px solid #8bff6a;color:#8bff6a;">PASS</div>
      </div>
    </div>
  </div>
</body>
</html>
